<!DOCTYPE html>
<html>
<head>
  <title>Auth Test</title>
</head>
<body>

  <h2>Register</h2>
  <input id="regName" placeholder="Name" required /><br><br>
  <input id="regEmail" placeholder="Email" required /><br><br>
  <input id="regPassword" type="password" placeholder="Password" required /><br><br>
  <button onclick="register()">Register</button>

  <hr>

  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email" /><br><br>
  <input id="loginPassword" type="password" placeholder="Password" /><br><br>
  <button onclick="login()">Login</button>

  <script>
    const BASE_URL = "http://localhost:5000/api/auth";

    // REGISTER
    async function register() {
      const name = document.getElementById("regName").value;
      const email = document.getElementById("regEmail").value;
      const password = document.getElementById("regPassword").value;

      const res = await fetch(`${BASE_URL}/register`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, email, password })
      });

      const data = await res.json();
      console.log("Register:", data);
      alert(data.message || "Registered!");
    }

    // LOGIN
    async function login() {
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;

      const res = await fetch(`${BASE_URL}/login`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      console.log("Login:", data);

      if (res.ok) {
        alert("Login successful");

        // store token (later use)
        if (data.token) {
          localStorage.setItem("token", data.token);
        }

      } else {
        alert(data.message);
      }
    }
  </script>

</body>
</html>
