<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>

  <body>
    <h1>User Dashboard</h1>

    <p id="name"></p>
    <p id="email"></p>
    <button onclick="logout()">logout</button>

    <br />
    <a href="updatePassword.html">click here to change the password</a>
    <script>
      const user = JSON.parse(localStorage.getItem("user"));

      function initDashboard() {
        if (!user) {
          window.location.href = "login.html"; // if user is null / it will redirect to login.html
          return;
        }

        document.getElementById("name").innerText = "Name: " + user.name;
        document.getElementById("email").innerText = "Email: " + user.email;
      }

      initDashboard();

      const logout = async () => {
        try {
           const isConfirmed = confirm("Are you sure you want to logout?");
 
            if (!isConfirmed) return;

          const base_url = "http://localhost:5000/api/user/logout";

          const res = await axios.post(base_url, {
            email: user.email,
          });

         
          localStorage.removeItem("user");
          window.location.href = "login.html"; // logout function
        } catch (error) {
          error;
        }
      };
    </script>
  </body>
</html>
