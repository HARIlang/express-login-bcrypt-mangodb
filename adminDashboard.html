<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>welcome <span id="admin_name"></span></h1>
    <h3>admin email <span id="admin_email"></span></h3>
</body>
<script>
    function initDashboard(){

   const user = JSON.parse(localStorage.getItem('user'));

   if(!user){
    
     window.location.href = 'adminLogin.html';
     return;
}


document.getElementById('admin_name').innerHTML =user.name
document.getElementById('admin_email').innerHTML =user.email


    }

    initDashboard();
</script>
</html>
