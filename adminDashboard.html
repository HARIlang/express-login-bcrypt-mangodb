<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>Document</title>
  </head>
  <body>
    <h1>welcome <span id="admin_name"></span></h1>
    <h3>admin email <span id="admin_email"></span></h3>
    <button type="button" onclick="logout()" style="color: red">logout</button>

    <button onclick="ViewUsers()">refresh 🔁</button>
    <p id="noUser"></p>
    <table>
      
      <table id="viewUser" border="1" style="border-collapse: collapse"></table>
    </table>
  </body>
  <script>
    function initDashboard() {
      // loading the dashboard

      const user = JSON.parse(localStorage.getItem("admin")); // getting data from localstorage

      if (!user) {
        // if data is not exist in local storage it will return to admin login
        window.location.href = "adminLogin.html";
        return;
      }

      document.getElementById("admin_name").innerHTML = user.name; // to display the data from the backend
      document.getElementById("admin_email").innerHTML = user.email;
    }

    initDashboard(); // calling the function

    function logout() {
      const confirmation = confirm("are you sure want to logout");

      if (!confirmation) {
        return;
      }

      localStorage.removeItem("admin");
      window.location.href = "adminLogin.html";
    }

    const ViewUsers = async () => {
      try {
        const base_url = "http://localhost:5000/api/user/admin/viewusers"; // base api to get users

        const res = await axios.get(base_url);

        const users = res?.data?.data;
        if (users.length === 0) {
          // validating no users
          document.getElementById("noUser").innerHTML = `<p> no users </p>`;
          return;
        }

        document.getElementById("viewUser").innerHTML = users // mapoping the user data in the tale by id
          .map(
            (user) =>
              `<tr>
      <td style="padding:7px";>${user.name}</td>
      <td style="padding:7px";>${user.email}</td>
     <td style="padding:7px; color:${user.isLogin ? "green" : "red"};">
  ${user.isLogin ? "online" : "offline"}
</td>
<td style="padding:7px">${user.lastLoginAt? new Date(user.lastLoginAt).toLocaleString("en-IN", {
  weekday: "long",     // Monday
  year: "numeric",     // 2026
  month: "long",       // April
  day: "numeric",      // 30
  hour: "2-digit",     // 09
  minute: "2-digit",   // 45
  second: "2-digit",   // 12
  hour12: true         // AM / PM
}):"never"}</td>
      </tr>`,
          )
          .join("");

        console.log(res?.data?.data);
      } catch (error) {
        console.log(error);
      }
    };
    ViewUsers();
  </script>
</html>
