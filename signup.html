<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup</title>
</head>
<body>

  <h1>Signup Page</h1>

  <form onsubmit="signup(event)">
    <table>
      <tr>
        <td>Name</td>
        <td>
          <input type="text" id="name" required placeholder="user_name" />
        </td>
      </tr>

      <tr>
        <td>Email</td>
        <td>
       
          <input type="email" id="email" required placeholder="@gmail.com" />
        </td>
      </tr>

      <tr>
        <td>Password</td>
        <td>
          
          <input type="password" id="password" required placeholder="password" />
        </td>
      </tr>

      <tr>
        <tr>
          <td> <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script> </td>
        </tr>
        <td>
         
          <button type="submit">Signup</button>
        </td>
        <td>
          <button type="reset">Cancel</button>
        </td>
      </tr>
    </table>
        <a href="login.html">already have a account login here</a>
  </form>
 
  <script>
    async function signup(e) {
      e.preventDefault(); 

      try {
        const BASE_URL = "http://localhost:5000/api/user";    // base url

        const name = document.getElementById("name").value.trim();  // trimming and assigning the value by the id for const
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        const res = await axios.post(`${BASE_URL}/signup`, {    // sending the user data to backend / axios
          name,
          email,
          password,
        });

        console.log("User registered:", res.data);   // passed : 
        alert("Signup successful!");
        
        
      } catch (error) {    // failed : indicates the error
        console.error(error);
        alert(error.response?.data?.message || "Signup failed");
      }
    }
  </script>

</body>
</html>
