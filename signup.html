<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup</title>
</head>
<body>

  <h1>Signup Page</h1>

  <!-- ✅ FIX: use onsubmit instead of onclick -->
  <form onsubmit="signup(event)">
    <table>
      <tr>
        <td>Name</td>
        <td>
          <input type="text" id="name" required placeholder="user_name" />
        </td>
      </tr>

      <tr>
        <td>Email</td>
        <td>
          <!-- ✅ FIX: removed duplicate type -->
          <input type="email" id="email" required placeholder="@gmail.com" />
        </td>
      </tr>

      <tr>
        <td>Password</td>
        <td>
          <!-- ✅ FIX: removed extra space in id -->
          <input type="password" id="password" required placeholder="password" />
        </td>
      </tr>

      <tr>
        <tr>
          <td> <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script> </td>
        </tr>
        <td>
          <!-- ✅ FIX: no onclick -->
          <button type="submit">Signup</button>
        </td>
        <td>
          <button type="reset">Cancel</button>
        </td>
      </tr>
    </table>
        <a href="login.html">already have a account login here</a>
  </form>

  <!-- Axios CDN -->
 

  <script>
    async function signup(e) {
      e.preventDefault(); // 🔥 VERY IMPORTANT

      try {
        const BASE_URL = "http://localhost:5000/api/user";

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        const res = await axios.post(`${BASE_URL}/signup`, {
          name,
          email,
          password,
        });

        console.log("User registered:", res.data);
        alert("Signup successful!");

      } catch (error) {
        console.error(error);
        alert(error.response?.data?.message || "Signup failed");
      }
    }
  </script>

</body>
</html>
