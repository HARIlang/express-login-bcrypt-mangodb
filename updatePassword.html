<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>welcome <span id="user_name"></span></p>

    <form onsubmit="changePassword(event)">
      <table>
        <tr>
          <td>user_name:</td>
          <td><input type="text" disabled id="userName" /></td>
        </tr>

        <tr>
          <td>email:</td>
          <td><input type="email" disabled id="email" /></td>
        </tr>
        <tr>
          <td>old_password</td>
          <td><input type="text" id="oldPassword" required /></td>
        </tr>
        <tr>
          <td>new_password</td>
          <td><input type="text" id="newPassword" required /></td>
        </tr>

        <tr>
          <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        </tr>
        <tr>
          <td><button type="submit">change password</button></td>
          <td><button type="reset">cancel</button></td>
        </tr>
      </table>
    </form>

    <a href="dashboard.html">back</a>    // direct to dashboard,html

    <script>
      const user = JSON.parse(localStorage.getItem("user")); // getting data form the internal storage

      document.getElementById("user_name").innerHTML = user.name; 
      document.getElementById("userName").value = user.name;
      document.getElementById("email").value = user.email;

      const changePassword = async (e) => {
        const testPass = (pass) => {
          const regex = /^(?=.*[A-Z])(?=.*[!@#$%^&*(),.?":{}|<>]).{6,}$/;
          regex.test(pass);
        };

        try {
          e.preventDefault();

          const url = "http://localhost:5000/api/user/updatepass";

          const oldPassword = document
            .getElementById("oldPassword")
            .value.trim();
          const newPassword = document
            .getElementById("newPassword")
            .value.trim();

          if (!testPass(newPassword)) {
            alert(
              "the password should be at least 6 character with one lowercase and one uppercase abd special character",
            );
            return;
          }

          const res = await axios.put(url, {
            email: user.email,
            oldPassword,
            newPassword,
          });

          console.log(res);
        } catch (error) {
          console.log(error.response.data.message);
        }
      };
    </script>
  </body>
</html>
