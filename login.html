<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
        <form onsubmit="login(event)">     // onsubmit event
            <table>
                <tr>
                    <td>email</td>
                    <td><input type="email"  id="email"></td>
                </tr>
                <tr>
                    <td>password</td>
                    <td><input type="password"  id="password"></td>
                </tr>
                 <tr>
          <tr> <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script> </tr>
        </tr>
                  <tr>
                    <td><input type="submit"></td>
                    <td><input type="reset"></td>
                </tr>
            </table>
            <a href="signup.html">don't have a account , signup here</a>
        </form>
    



    <script>

            const login = async(e)=>{
                 e.preventDefault();        // preventing form browser refresh
               try{
                const login_url ='http://localhost:5000/api/user/login';    // base url api for login

                   const email = document.getElementById('email').value.trim();     // assigning value to const variable by id
                   const password = document.getElementById('password').value.trim();
                    
              const res = await axios.post(login_url,{    // passing  the email and  password  to axios / backend
                email,
                password
              });
              
              
           console.log(res.data.user)

           localStorage.setItem('user',  JSON.stringify(res.data.user));

           window.location.href = 'dashboard.html'
               
            }

            catch(error){      // indicates the backend error

             console.log('FULL ERROR:',error);
             console.log(error.response.data);
             console.log(error.response.message);
             
            }
   }





    </script>

</body>
</html>
